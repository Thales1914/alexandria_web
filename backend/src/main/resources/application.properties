spring.application.name=alexandria
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.config.import=optional:file:.env[.properties],optional:file:../frontend/.env.local[.properties],optional:file:frontend/.env.local[.properties]

server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/alexandria}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:300903tmb}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:essaEhUmaChaveMuitoLongaEQualquerParaTeste123456}
jwt.expiration=86400000

# Frontend / CORS
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Google Books
google.books.api-url=${GOOGLE_BOOKS_URL:https://www.googleapis.com/books/v1/volumes}
google.books.api-key=${GOOGLE_BOOKS_API_KEY:${VITE_GOOGLE_BOOKS_API_KEY:}}
google.books.lang=${GOOGLE_BOOKS_LANG:pt}
google.books.country=${GOOGLE_BOOKS_COUNTRY:BR}
